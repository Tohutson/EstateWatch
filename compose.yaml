services:
  scanner:
    image: ghcr.io/tohutson/estate-sale-finder:latest
    build:
      context: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./model-cache:/app/model-cache
      - ./config:/app/config:ro
    restart: "no"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
